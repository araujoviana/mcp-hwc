    "huaweicloudsdkgaussdbfornosql>=3.1.192",
    "huaweicloudsdkgaussdbforopengauss>=3.1.192",
    "huaweicloudsdkgeip>=3.1.192",
    "huaweicloudsdkiam>=3.1.192",
    "huaweicloudsdkims>=3.1.192",
    "huaweicloudsdkkafka>=3.1.192",
    "huaweicloudsdkkms>=3.1.192",
