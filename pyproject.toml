    "paramiko>=3.5.1",
    "python-dotenv",
]

[project.scripts]
mcp-hwc = "mcp_hwc.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mcp_hwc"]

[dependency-groups]
dev = [
    "pytest",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
